
azure:
  # Full URL to your Azure Storage Account.
  account_url: "https://syncstoragev1.blob.core.windows.net"


  container_prefix: "backup"


sync:

  debounce_seconds: 2.0


  max_retries: 5

 
  retry_backoff_base: 2.0


  worker_threads: 2


  initial_sync_on_start: true


logging:
  level: "INFO"       # DEBUG | INFO | WARNING | ERROR
  log_dir: "logs"     # Relative to agent root or absolute path
  max_bytes: 10485760 # Max size per log file (10 MB)
  backup_count: 5     # Number of rotated log files to keep
